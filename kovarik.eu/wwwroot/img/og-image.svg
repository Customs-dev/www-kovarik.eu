<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#161625"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="150" r="300" fill="url(#glow1)"/>
  <circle cx="1000" cy="500" r="350" fill="url(#glow2)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Code block decoration (right side) -->
  <g transform="translate(780, 140)" opacity="0.15">
    <rect width="360" height="360" rx="16" fill="#1a1a2e" stroke="#ffffff" stroke-opacity="0.06"/>
    <rect x="0" y="0" width="360" height="4" rx="2" fill="url(#accent)"/>
    <!-- Dots -->
    <circle cx="20" cy="20" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="20" r="5" fill="#febc2e"/>
    <circle cx="52" cy="20" r="5" fill="#28c840"/>
    <!-- Fake code lines -->
    <rect x="20" y="50" width="120" height="10" rx="3" fill="#c792ea" opacity="0.6"/>
    <rect x="150" y="50" width="80" height="10" rx="3" fill="#82aaff" opacity="0.6"/>
    <rect x="20" y="75" width="60" height="10" rx="3" fill="#89ddff" opacity="0.4"/>
    <rect x="40" y="100" width="160" height="10" rx="3" fill="#c3e88d" opacity="0.5"/>
    <rect x="40" y="125" width="100" height="10" rx="3" fill="#f78c6c" opacity="0.5"/>
    <rect x="150" y="125" width="70" height="10" rx="3" fill="#c3e88d" opacity="0.4"/>
    <rect x="40" y="150" width="200" height="10" rx="3" fill="#82aaff" opacity="0.4"/>
    <rect x="40" y="175" width="80" height="10" rx="3" fill="#c792ea" opacity="0.5"/>
    <rect x="130" y="175" width="120" height="10" rx="3" fill="#c3e88d" opacity="0.4"/>
    <rect x="20" y="200" width="60" height="10" rx="3" fill="#89ddff" opacity="0.4"/>
    <rect x="20" y="235" width="140" height="10" rx="3" fill="#c792ea" opacity="0.5"/>
    <rect x="170" y="235" width="90" height="10" rx="3" fill="#82aaff" opacity="0.5"/>
    <rect x="40" y="260" width="180" height="10" rx="3" fill="#f78c6c" opacity="0.4"/>
    <rect x="40" y="285" width="110" height="10" rx="3" fill="#c3e88d" opacity="0.5"/>
    <rect x="20" y="310" width="60" height="10" rx="3" fill="#89ddff" opacity="0.4"/>
  </g>

  <!-- Connector dots & lines (particle-like decoration) -->
  <g opacity="0.12" fill="#00d4ff" stroke="#00d4ff" stroke-width="0.5">
    <circle cx="100" cy="500" r="2"/><circle cx="160" cy="520" r="1.5"/>
    <circle cx="130" cy="480" r="1"/><circle cx="200" cy="540" r="2.5"/>
    <circle cx="180" cy="460" r="1.5"/><circle cx="250" cy="510" r="1"/>
    <line x1="100" y1="500" x2="160" y2="520"/>
    <line x1="160" y1="520" x2="130" y2="480"/>
    <line x1="130" y1="480" x2="180" y2="460"/>
    <line x1="200" y1="540" x2="160" y2="520"/>
    <line x1="180" y1="460" x2="250" y2="510"/>
  </g>

  <!-- Terminal icon -->
  <text x="80" y="220" font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="42" font-weight="700" fill="url(#accent)" opacity="0.8">&gt;_</text>

  <!-- Site name -->
  <text x="80" y="188" font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="16" fill="#00d4ff" opacity="0.7" letter-spacing="3">KOVARIK.EU</text>

  <!-- Name -->
  <text x="80" y="330" font-family="Inter, -apple-system, sans-serif"
        font-size="72" font-weight="700" fill="url(#accent)">Mgr. Roman</text>
  <text x="80" y="410" font-family="Inter, -apple-system, sans-serif"
        font-size="72" font-weight="700" fill="url(#accent)">Kovařík</text>

  <!-- Title -->
  <text x="80" y="465" font-family="Inter, -apple-system, sans-serif"
        font-size="26" font-weight="300" fill="#9ca3af">.NET Developer  ·  AI Enthusiast  ·  Web Architect</text>

  <!-- Tech tags -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#00d4ff" opacity="0.6">
    <rect x="80" y="500" width="55" height="26" rx="6" fill="none" stroke="#00d4ff" stroke-opacity="0.3"/>
    <text x="87" y="518">C#</text>
    <rect x="147" y="500" width="65" height="26" rx="6" fill="none" stroke="#00d4ff" stroke-opacity="0.3"/>
    <text x="154" y="518">.NET</text>
    <rect x="224" y="500" width="100" height="26" rx="6" fill="none" stroke="#00d4ff" stroke-opacity="0.3"/>
    <text x="231" y="518">Angular</text>
    <rect x="336" y="500" width="120" height="26" rx="6" fill="none" stroke="#00d4ff" stroke-opacity="0.3"/>
    <text x="343" y="518">ASP.NET Core</text>
    <rect x="468" y="500" width="70" height="26" rx="6" fill="none" stroke="#00d4ff" stroke-opacity="0.3"/>
    <text x="475" y="518">Azure</text>
    <rect x="550" y="500" width="45" height="26" rx="6" fill="none" stroke="#00d4ff" stroke-opacity="0.3"/>
    <text x="557" y="518">AI</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
