<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <!-- Subtle glow -->
  <circle cx="180" cy="180" r="200" fill="url(#glowGrad)" opacity="0.5"/>
  <!-- Terminal bracket > _ -->
  <text x="256" y="300" text-anchor="middle" dominant-baseline="central"
        font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace"
        font-weight="700" font-size="260" fill="url(#accentGrad)">
    &gt;_
  </text>
  <!-- Top accent line -->
  <rect x="0" y="0" width="512" height="6" rx="3" fill="url(#accentGrad)"/>
</svg>
